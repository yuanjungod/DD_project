name: CI

on:
  push:
    branches: [main, master, kimi]
  pull_request:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Install agent service dependencies
        run: pip install -r agent_service/requirements.txt

      - name: Shared workflow graph tests
        run: python -m unittest shared/test_workflow_graph.py

      - name: Agent tool registry tests
        run: python -m unittest agent_service/tools/test_registry.py

      - name: Agent service auth tests
        run: python -m unittest agent_service/tests/test_api_auth.py

      - name: Backend tests
        env:
          PYTHONPATH: backend
        run: python -m unittest discover -s backend/tests -p 'test_*.py'

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck and build
        run: npm run build
