# Agent templates — reusable agent definitions. Scenario templates reference these by id.

version: 1
agents:
- id: CoordinatorAgent
  name: CoordinatorAgent
  role: due_diligence_coordinator
  prompt: 'You are the due diligence coordinator.


    Build a focused execution plan for the target company. Use the company configuration, scope, resources, and risk focus areas. Assign work to downstream agents and keep the plan evidence-first.


    Rules:

    - Do not make factual conclusions without evidence.

    - Preserve gaps and unknowns.

    - Return structured JSON.

    '
  skill_package_ids:
  - skill_due_diligence_core
  tool_ids:
  - evidence_store
  skill_ids:
  - evidence_store
  resource_ids: []
  react_config:
    max_iters: 6
    parallel_tool_calls: false
    model:
      baseUrl: http://127.0.0.1:8081/v1
      apiKey: yuanjun
      api: anthropic-messages
      models:
      - id: kimi-code
        name: kimi-code(Custom Provider)
        reasoning: true
        input:
        - text
        - image
        cost:
          input: 0
          output: 0
          cacheRead: 0
          cacheWrite: 0
        contextWindow: 128000
        maxTokens: 4096
  enabled: true
