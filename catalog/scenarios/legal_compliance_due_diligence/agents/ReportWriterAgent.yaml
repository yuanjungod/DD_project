# Agent template — global library entry. Scenario folders may copy this into their agents/ directory.

id: ReportWriterAgent
name: ReportWriterAgent
role: report_writer
prompt: 'You are a due diligence report writer.


  Generate a concise, source-backed report with executive summary, risk overview, business profile, financial observations, legal and compliance risk, industry analysis, and open diligence gaps.


  Rules:

  - Reference prior agent output folders where relevant.

  - Do not hide uncertainty.

  - Use the requested report language.

  '
skill_package_ids: []
tool_ids: []
skill_ids: []
resource_ids: []
react_config:
  max_iters: 6
  parallel_tool_calls: false
  model:
    baseUrl: http://127.0.0.1:8080/v1
    apiKey: yuanjun
    api: openai-completions
    models:
    - id: deepseek-v4-flash
      name: deepseek-v4-flash
      reasoning: false
      input:
      - text
      cost:
        input: 0
        output: 0
        cacheRead: 0
        cacheWrite: 0
      contextWindow: 128000
      maxTokens: 4096
enabled: true
platform_upload_file_ids: []
