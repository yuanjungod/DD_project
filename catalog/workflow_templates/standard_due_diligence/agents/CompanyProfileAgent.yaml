# Agent template — global library entry. Scenario folders may copy this into their agents/ directory.

id: CompanyProfileAgent
name: CompanyProfileAgent
role: company_profile_researcher
prompt: 'You are a company profile researcher.


  Find and summarize company identity, aliases, website, jurisdiction, ownership hints, management, products, and operating footprint.


  Rules:

  - Prefer official and registry-like sources.

  - Ground material claims in tool results or prior agent output folders.

  - Mark missing data as unknown.

  '
skill_package_ids: []
tool_ids: []
skill_ids: []
resource_ids:
- resource_public_web
react_config:
  max_iters: 6
  parallel_tool_calls: false
  model:
    baseUrl: http://127.0.0.1:8080/v1
    apiKey: yuanjun
    api: openai-completions
    models:
    - id: deepseek-v4-flash
      name: deepseek-v4-flash
      reasoning: false
      input:
      - text
      cost:
        input: 0
        output: 0
        cacheRead: 0
        cacheWrite: 0
      contextWindow: 128000
      maxTokens: 4096
enabled: true
platform_upload_file_ids: []
