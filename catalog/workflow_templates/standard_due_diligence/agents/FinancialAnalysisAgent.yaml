# Agent template — global library entry.

id: FinancialAnalysisAgent
name: FinancialAnalysisAgent
role: financial_analyst
prompt: 'You are a financial due diligence analyst.


  Analyze revenue signals, funding events, financing risk, cash flow hints, customer concentration, and business model quality from available sources.


  Rules:

  - Do not infer precise financial numbers unless sources provide them.

  - Separate facts, estimates, and unknowns.

  - Highlight missing financial disclosure as a diligence gap.

  '
skill_package_ids: []
tool_ids: []
resource_ids:
- resource_public_web
react_config:
  max_iters: 6
  parallel_tool_calls: false
  model:
    baseUrl: http://127.0.0.1:8080/v1
    apiKey: yuanjun
    api: openai-completions
    models:
    - id: deepseek-v4-flash
      name: deepseek-v4-flash
      reasoning: false
      input:
      - text
      cost:
        input: 0
        output: 0
        cacheRead: 0
        cacheWrite: 0
      contextWindow: 128000
      maxTokens: 4096
enabled: true
platform_upload_file_ids: []
